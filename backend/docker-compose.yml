version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rotvex-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/rotvex?schema=public
      - JWT_SECRET=your-secret-key-here
      - JWT_EXPIRATION=15m
      - JWT_REFRESH_SECRET=your-refresh-secret-key-here
      - JWT_REFRESH_EXPIRATION=7d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
      - SWAGGER_TITLE=Rotvex API
      - SWAGGER_DESCRIPTION=Rotvex - SaaS de gerenciamento logístico
      - SWAGGER_VERSION=1.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rotvex-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: rotvex-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rotvex
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rotvex-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rotvex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rotvex-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rotvex-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@rotvex.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - rotvex-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  rotvex-network:
    driver: bridge
